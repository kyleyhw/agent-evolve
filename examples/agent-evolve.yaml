# Example manifest for agent-evolve.
#
# Drop this file (renamed to `agent-evolve.yaml`) into the directory you want to
# evolve. Every section below except `problem:`, `scope:`, and `backend:` has
# sensible defaults — a minimal config is ~5 lines.
version: 1

problem:
  description: "Optimise the order pricing calculator for speed and accuracy"
  mode: runtime                         # algorithm | runtime
  eval_command: "pytest tests/pricing/ --benchmark-json=benchmark.json"
  metrics:
    - name: duration_ms
      optimise: minimize
    - name: test_pass_rate
      optimise: maximize
      minimum: 1.0                      # hard constraint — must be 100%

scope:
  target_files:
    - src/pricing/calculator.py
    - src/pricing/utils.py
  do_not_touch:
    - src/auth/
    - src/db/
    - src/pricing/models.py
  max_diff_files: 3

evolution:
  rounds: 5
  candidates_per_round: 3
  operators: [mutate, crossover, explore]
  prune_strategy: pareto                # pareto | top_k

runtime_mode:
  equivalence_check: required           # required | optional | disabled
  property_test_samples: 500
  regression_tests: "pytest tests/pricing/ -x"

safety:
  protected_branch: main
  # agents_can_merge is hardcoded False in every backend — this line is
  # informational only; the code ignores any override.
  agents_can_merge: false
  require_human_approval: true
  final_pr_reviewers:
    - kyleyhw

backend:
  type: local                           # local | github | gitlab
  repo: kyleyhw/agent-evolve            # used by github / gitlab backends
  root_dir: evolve-state                # used by local backend

# Optional. Per-role agent assignment. Default for every role is "claude"
# (the in-session model — Opus 4.7 / latest in Claude Code). Any other
# value is a bare agent name; the supervisor SKILL resolves it to a CLI
# (e.g. "gemini" -> `gemini -p ...`, "codex" -> `codex exec ...`).
# Supervisor is informational — it must stay in-session in this version.
#
# `explorer` also accepts a list — an "ensemble" — and the supervisor
# distributes the round's candidate slots round-robin across the list.
# With candidates_per_round=3 and explorer=[claude, gemini], slots 1/2/3
# go to claude/gemini/claude. Reviewer accepts a single agent only.
# agents:
#   reviewer: gemini
#   explorer: [claude, gemini]
